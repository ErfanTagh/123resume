# HTTP — www → HTTPS apex (one hop; good for SEO duplicate-host rules)
server {
    listen 80;
    listen [::]:80;
    server_name www.123resume.de;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://123resume.de$request_uri;
    }
}

# HTTP — apex → HTTPS apex
server {
    listen 80;
    listen [::]:80;
    server_name 123resume.de;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://123resume.de$request_uri;
    }
}

# HTTPS — www → HTTPS apex (301; canonical host is non-www)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.123resume.de;

    ssl_certificate /etc/letsencrypt/live/123resume.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/123resume.de/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    return 301 https://123resume.de$request_uri;
}

# HTTPS — main configuration (apex only)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name 123resume.de;

    # SSL certificates (will be generated by certbot)
    ssl_certificate /etc/letsencrypt/live/123resume.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/123resume.de/privkey.pem;

    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Backend API
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Django admin
    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static files
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media files
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Dynamic sitemap - proxy to backend API
    location = /sitemap.xml {
        proxy_pass http://backend:8000/api/sitemap.xml;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        # Set correct content type
        add_header Content-Type "application/xml; charset=utf-8" always;

        # Cache sitemap for 1 hour (updates when new blog posts are added)
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Hashed build assets (Vite fingerprints every filename) — safe to cache forever.
    # ^~ makes this win over the .js/.css regex below for /assets/* requests.
    location ^~ /assets/ {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Any other JS/CSS (e.g. unhashed files from public/) — short cache.
    location ~* \.(js|css)$ {
        root /usr/share/nginx/html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Frontend React app - HTML files should not be cached
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }
}
